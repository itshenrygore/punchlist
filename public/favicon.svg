<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: warm light with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#f5f4f1"/>
  <!-- Impact mark: thick vertical bar (the "punch") -->
  <rect x="148" y="113" width="67" height="286" rx="34" fill="#d45a1a"/>
  <!-- Echo line: thinner, faded -->
  <rect x="245" y="113" width="38" height="286" rx="19" fill="#d45a1a" opacity="0.45"/>
</svg>
