    <meta name="description" content="Quote faster, scope better, and catch what gets missed before you drive off." />

    <link rel="manifest" href="/manifest.json" />
    <!-- CRITICAL: Apply theme BEFORE any CSS renders to prevent flash -->
    <script>
      (function(){
        var t='light';
        try{var s=localStorage.getItem('pl_theme');if(s==='dark'||s==='light')t=s}catch(e){}
        document.documentElement.setAttribute('data-theme',t);
        var m=document.getElementById('meta-theme-color');
        if(m)m.content=t==='dark'?'#0F0F10':'#F6F5F2';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
